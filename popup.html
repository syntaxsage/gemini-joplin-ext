<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Page Summarizer</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            width: 400px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
        }
        
        h2 {
            color: #333;
            margin-top: 0;
            font-size: 18px;
        }
        
        .info-box {
            background: white;
            border-left: 4px solid #0078d4;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.5;
            color: #555;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        button {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        
        .primary {
            background-color: #0078d4;
            color: white;
        }
        
        .primary:hover {
            background-color: #005a9e;
        }
        
        .secondary {
            background-color: #e5e5e5;
            color: #333;
        }
        
        .secondary:hover {
            background-color: #d0d0d0;
        }
        
        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        
        .status.success {
            background-color: #dffcf0;
            color: #107c10;
            border-left: 4px solid #107c10;
            display: block;
        }
        
        .status.error {
            background-color: #fdecea;
            color: #d13438;
            border-left: 4px solid #d13438;
            display: block;
        }
        
        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 12px;
            line-height: 1.4;
        }
        
        .help-text a {
            color: #0078d4;
            text-decoration: none;
        }
        
        .help-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h2>Web Page Summarizer</h2>
    
    <div class="info-box">
        <strong>How it works:</strong><br>
        Right-click on any web page or element and select "Summarize Page and Send to Joplin" from the context menu.
    </div>
    
    <div class="button-group">
        <button class="primary" id="open-settings">Settings</button>
        <button class="secondary" id="open-guide">Guide</button>
    </div>
    
    <div id="status" class="status"></div>
    
    <div class="help-text">
        📚 Need help? Check out the <a href="https://github.com/your-username/gemini-joplin-ext#readme" target="_blank">documentation</a>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
